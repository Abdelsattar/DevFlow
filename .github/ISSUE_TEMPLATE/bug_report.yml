---
name: Bug Report
description: Report a bug or unexpected behavior in DevFlow
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: DevFlow Version
      description: Which version of DevFlow are you running? (Check **DevFlow → About DevFlow**)
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      description: Which macOS version are you on?
      placeholder: "e.g. macOS 14.5 (Sonoma)"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of DevFlow is affected?
      options:
        - Jira Integration
        - GitHub Integration
        - Copilot / AI Chat
        - Autonomous Flow
        - Git Operations
        - PR Creation
        - Settings / Onboarding
        - UI / Navigation
        - Notifications
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Describe the expected behavior...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open DevFlow
        2. Go to ...
        3. Click on ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      description: |
        Paste any relevant log output or error messages.
        **⚠️ Redact any tokens, API keys, or personal information before pasting.**
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context — GitHub Enterprise vs github.com, Jira Cloud vs Server, worktree setup, etc.
